# AeroSpace config — floating by default, riced gaps when tiling
# Docs: https://nikitabobko.github.io/AeroSpace/guide

start-at-login = true
after-startup-command = []

# Push the focused workspace to sketchybar so the bar's space pills update.
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# Default: floating. Won't disrupt Rectangle / normal macOS feel.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Open every new window as floating. Switch to tiling per-workspace
# with: alt+shift+space  (toggles the focused window's layout)
on-window-detected = [
    { check-further-callbacks = true, run = ['layout floating'] },
]

# Mouse follows focus, focus follows window under cursor — feels native.
# Also nudge sketchybar so per-space app glyphs stay in sync.
on-focus-changed = [
    'move-mouse window-lazy-center',
    'exec-and-forget sketchybar --trigger aerospace_workspace_change',
]
automatically-unhide-macos-hidden-apps = false

[gaps]
# 3px padding around windows. Top = bar height (33) + 3 padding.
inner.horizontal = 3
inner.vertical = 3
outer.left = 3
outer.bottom = 3
outer.top = 36
outer.right = 3

[mode.main.binding]
# Toggle current window between floating <-> tiling
alt-shift-space = 'layout floating tiling'

# Switch the whole workspace layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Workspaces 1-5
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# Reload config
alt-shift-c = 'reload-config'
